<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blockworld</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #6eb5ff;
      }
      canvas {
        display: block;
      }
      #hint {
        position: fixed;
        bottom: 5.5rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.9);
        font: 14px/1.4 system-ui, sans-serif;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      #restart {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 10;
        padding: 0.5rem 0.85rem;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 6px;
        background: rgba(0, 0, 0, 0.35);
        color: rgba(255, 255, 255, 0.95);
        font: 13px system-ui, sans-serif;
        cursor: pointer;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
      #restart:hover {
        background: rgba(0, 0, 0, 0.5);
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 16px;
        height: 16px;
        margin: -8px 0 0 -8px;
        pointer-events: none;
        opacity: 0;
        z-index: 5;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 0 2px rgba(0, 0, 0, 0.5);
      }
      #crosshair::before {
        left: 7px;
        top: 3px;
        width: 2px;
        height: 10px;
      }
      #crosshair::after {
        left: 3px;
        top: 7px;
        width: 10px;
        height: 2px;
      }
      #crosshair.active {
        opacity: 1;
      }
      #hotbar {
        position: fixed;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        padding: 4px;
        background: rgba(0, 0, 0, 0.45);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        z-index: 8;
        pointer-events: auto;
      }
      .inv-slot {
        width: 44px;
        height: 44px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-radius: 3px;
        background: rgba(0, 0, 0, 0.35);
        position: relative;
        cursor: pointer;
      }
      .inv-slot.selected {
        border-color: #fff;
        box-shadow: 0 0 0 1px #fff;
      }
      .inv-slot .block-icon {
        position: absolute;
        inset: 6px;
        border-radius: 2px;
        border: 1px solid rgba(0, 0, 0, 0.35);
      }
      .inv-slot .count {
        position: absolute;
        right: 3px;
        bottom: 1px;
        font: bold 11px system-ui, sans-serif;
        color: #fff;
        text-shadow: 0 1px 2px #000;
      }
      #inventory-panel {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.55);
        z-index: 20;
        pointer-events: auto;
      }
      #inventory-panel.open {
        display: flex;
      }
      #inventory-panel .panel {
        padding: 12px;
        background: rgba(30, 30, 30, 0.92);
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-radius: 6px;
      }
      #inventory-panel h2 {
        color: #eee;
        font: 600 14px system-ui, sans-serif;
        margin-bottom: 10px;
        text-align: center;
      }
      #inventory-grid {
        display: grid;
        grid-template-columns: repeat(9, 44px);
        gap: 4px;
        margin-bottom: 10px;
      }
      #inventory-panel .hotbar-label {
        color: rgba(255, 255, 255, 0.6);
        font: 11px system-ui, sans-serif;
        margin-bottom: 4px;
      }
      #inventory-hotbar {
        display: flex;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <button type="button" id="restart">Restart</button>
    <div id="crosshair" aria-hidden="true"></div>
    <div id="hotbar"></div>
    <div id="inventory-panel">
      <div class="panel">
        <h2>Inventory</h2>
        <div id="inventory-grid"></div>
        <p class="hotbar-label">Hotbar</p>
        <div id="inventory-hotbar"></div>
        <p class="hotbar-label" style="margin-top: 10px; text-align: center">
          Press E to close · Click slots to swap with selected hotbar slot
        </p>
      </div>
    </div>
    <p id="hint">
      Click to play · WASD move · Space jump · LMB break · RMB place · E inventory · 1–9 hotbar
    </p>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
