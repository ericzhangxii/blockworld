<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blockworld</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #6eb5ff;
      }
      canvas {
        display: block;
      }
      #hint {
        position: fixed;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.9);
        font: 14px/1.4 system-ui, sans-serif;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <p id="hint">Click to play · WASD to walk · Space to jump</p>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
